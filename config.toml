# BioMoQA RAG Configuration

[server]
host = "0.0.0.0"
port = 9000
workers = 1  # Keep at 1 for GPU mode
log_level = "info"

[model]
# Inference mode: "gpu", "gpu_small", or "cpu"
mode = "gpu"

# Model name for GPU mode (Qwen3-8B fits in 20GB MIG with fp8, ~8GB weights)
model_name = "Qwen/Qwen3-8B"

# Model size for CPU mode: "0.5b", "1.5b", "3b", "7b"
size = "8b"

# GPU settings
gpu_memory_utilization = 0.83
quantization = "fp8"  # or null to disable

[generation]
max_tokens = 200
temperature = 0.1

[retrieval]
# Number of documents to retrieve initially
retrieval_n = 20

# Use smart hybrid retrieval (SIBILS + FAISS)
use_smart_retrieval = true

# Hybrid retrieval weight (0 = SIBILS only, 1 = FAISS only)
hybrid_alpha = 0.5

[sibils]
# SIBILS search API endpoint
search_api_url = "https://biodiversitypmc.sibils.org/api/search"

# SIBILS query parser API endpoint
query_parser_api_url = "https://biodiversitypmc.dev.sibils.org/api/query/parse"

# Default collections to search (comma-separated): medline, plazi, pmc, suppdata
collections = ["medline", "plazi", "pmc", "suppdata"]

# HTTP User-Agent header for API requests
user_agent = "BioMoQA-RAG/1.0 (https://github.com/sibils/BioMoQA-RAG)"

# Disk cache for SIBILS responses (avoids repeated API calls for identical queries)
cache_dir = "data/sibils_cache"
cache_ttl = 604800  # 7 days in seconds

[reranking]
enabled = true
model = "cross-encoder/ms-marco-MiniLM-L-6-v2"
top_k = 10

[extraction]
# BioBERT device: 0 = GPU, -1 = CPU. GPU cuts inference from ~0.8s to ~0.05s.
device = 0

[relevance_filter]
enabled = true
min_overlap = 0.15
final_n = 8

[context]
max_abstract_length = 1500
truncate_abstracts = true

[data]
# Path to FAISS index and documents
faiss_index = "data/faiss_index.bin"
documents = "data/documents.pkl"
